<div class="lobby" [class.chat-open]="activeRoomId">
  <aside class="sidebar">
    <header class="net-head">
      <span class="net-mark">FPO · NET</span>
      <span class="net-user">{{ currentEmail }}</span>
    </header>

    <button class="new-room-btn" (click)="startCreate()" *ngIf="!creating">
      <span class="plus">+</span> Nueva sala
    </button>

    <div class="create-box" *ngIf="creating">
      <input
        type="text"
        [(ngModel)]="newRoomName"
        (keydown)="onCreateKeyDown($event)"
        placeholder="Nombre de la sala"
        autofocus
      />
      <div class="create-actions">
        <button (click)="confirmCreate()">Aceptar</button>
        <button class="secondary" (click)="cancelCreate()">Cancelar</button>
      </div>
      <span class="error" *ngIf="createError">{{ createError }}</span>
    </div>

    <span class="list-label">Salas activas</span>
    <ul class="room-list">
      <li
        *ngFor="let room of rooms"
        class="room-item"
        [class.active]="room.id === activeRoomId"
        (click)="selectRoom(room)"
      >
        <span class="room-name">{{ room.name }}</span>
        <span class="room-count">{{ room.count }}</span>
      </li>
      <li class="empty" *ngIf="rooms.length === 0">No hay salas todavía</li>
    </ul>

    <button class="logout-btn" (click)="logout()">Salir</button>
  </aside>

  <section class="chat-area">
    <ng-container *ngIf="activeRoomId; else noRoom">
      <div class="chat-header">
        <button class="back-btn" (click)="backToRooms()" aria-label="Volver a salas">‹</button>
        <span class="room-title">{{ activeRoomName }}</span>
        <button class="delete-btn" (click)="deleteActiveRoom()">Borrar sala</button>
      </div>
      <div class="messages">
        <div
          *ngFor="let msg of messages"
          class="message"
          [class.own]="msg.uid === currentUid"
        >
          <span class="sender">{{ msg.email }}</span>
          <span class="text">{{ msg.text }}</span>
          <span class="time">{{ msg.timestamp | date: 'HH:mm:ss' }}</span>
        </div>
      </div>
      <div class="input-row">
        <input
          type="text"
          [(ngModel)]="inputText"
          (keydown)="onKeyDown($event)"
          placeholder="Escribe un mensaje y pulsa Enter"
        />
        <button (click)="send()">Enviar</button>
      </div>
    </ng-container>

    <ng-template #noRoom>
      <div class="placeholder">
        <div class="placeholder-glyph" aria-hidden="true">◇</div>
        <p *ngIf="roomError" class="error">{{ roomError }}</p>
        <p class="placeholder-text">Selecciona o crea una sala para empezar</p>
      </div>
    </ng-template>
  </section>
</div>
