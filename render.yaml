services:
  # Frontend: Angular (Static Site)
  - type: web
    name: fpo-chat-frontend
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist/fpo-chat/browser
    routes:
      # SPA fallback: cualquier ruta sirve index.html (necesario para el router de Angular).
      - type: rewrite
        source: /*
        destination: /index.html
